name: pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: write-all

jobs:
  release:
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@migrate-to-ubuntu-latest
    secrets: inherit

  build:
    needs: [release]
    uses: guilhermelinosp/ci-templates/.github/workflows/dotnet-build.yml@migrate-to-ubuntu-latest
    with:
      version: ${{ needs.release.outputs.version }}

  push:
    needs: [build]
    uses: guilhermelinosp/ci-templates/.github/workflows/dotnet-push.yml@migrate-to-ubuntu-latest
    secrets: inherit
    with:
      version: ${{ needs.release.outputs.version }}
