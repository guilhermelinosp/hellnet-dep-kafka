name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore app/Hellnet.Kafka.slnx
      - run: dotnet build app/Hellnet.Kafka.slnx --configuration Release --no-restore
      - run: dotnet test app/Hellnet.Kafka.slnx --configuration Release --no-build --verbosity normal
